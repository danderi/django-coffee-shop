{% extends "base.html" %}
{% load tailwind_filters %}
{% block content %}
<h1 class="text-4xl font-extrabold tracking-tight text-gray-900 sm:text-3xl">Iniciar sesión</h1>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button 
        class="inline-block rounded-sm border border-amber-900 bg-amber-900 px-12 py-3 text-sm font-medium text-white hover:bg-transparent hover:text-amber-900" 
        type="submit"> 
        Login 
    </button>
</form>
{%endblock content%}

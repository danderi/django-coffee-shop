<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Coffee Shop{% endblock %}</title>
    <!-- Tailwind CSS vía CDN para empezar rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 text-stone-900 flex flex-col min-h-screen">

    <!-- NAVBAR / MENU -->
    <nav class="bg-amber-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold">☕ Coffee Shop</a>
            <ul class="flex gap-6">
                <li><a href="#" class="hover:text-amber-200">Inicio</a></li>
                <li><a href="#" class="hover:text-amber-200">Productos</a></li>
                <li><a href="#" class="hover:text-amber-200">Mi Orden</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container mx-auto p-8 flex-grow">
        {% block content %}
        <!-- Aquí es donde las otras páginas inyectarán su código -->
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="bg-stone-800 text-stone-400 p-6 text-center mt-auto">
        <p>&copy; 2024 Coffee Shop Django - Aprendiz de Platzi</p>
    </footer>

</body>
</html>

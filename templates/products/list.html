{% extends 'base.html' %}

{% block content %}
<h1 class="text-3xl font-bold mb-6">Nuestros Cafés ☕</h1>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for product in products %}
    <div class="bg-white p-4 shadow rounded-lg">
        <h2 class="text-xl font-semibold">{{ product.name }}</h2>
        <p class="text-gray-600">{{ product.description }}</p>
        <p class="text-amber-700 font-bold mt-2">${{ product.price }}</p>
    </div>
    {% if product.photo %}
    <img src="{{ product.photo.url }}" alt="{{ product.name }}" class="w-full h-48 object-cover rounded-md mb-4">
    {% endif %}

    {% empty %}
    <p>Aún no hay cafés cargados.</p>
    {% endfor %}
</div>
{% endblock %}
